name: sozo_manga
description: "Sozo Read - manga & novel reader powered by JS providers."
publish_to: 'none'
version: 1.3.1+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # DI
  get_it: ^8.0.3

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # JS engine
  flutter_js: ^0.8.0

  # Images
  cached_network_image: ^3.4.1

  # Curated Google Fonts pickable per-book in the novel reader.
  # `google_fonts` lazily fetches the font file on first use and
  # caches it on disk; subsequent reads (cold or hot) come from the
  # local cache.
  google_fonts: ^6.2.1
  # Direct dep on the cache backend so we can swap in a size-capped
  # custom CacheManager (`AppImageCacheManager`) in place of
  # `DefaultCacheManager`. cached_network_image already pulls this in
  # transitively; declaring it here just makes the import explicit.
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.3
  palette_generator: ^0.3.3+5

  # Utility
  dartz: ^0.10.1
  json_annotation: ^4.11.0
  flutter_dotenv: ^5.1.0

  # Hardware volume key page navigation in the manga reader.
  flutter_volume_controller: ^1.3.2

  # Optional Supabase auth + cloud sync (magic-link sign-in).
  supabase_flutter: ^2.8.0

  # Profile-avatar picker — gallery + camera (uploads to Cloudinary).
  image_picker: ^1.1.2

  # Opens GitHub / Telegram links from the Developers credits page.
  url_launcher: ^6.3.1

  # Cold-start + warm-start deep-link handling (sozoread://...). Already
  # in pubspec.lock as a transitive dep of supabase_flutter; declared
  # explicitly so we can import it directly.
  app_links: ^6.3.2

  # Local notifications for new-chapter alerts. Fired from an
  # on-app-resume chapter check (NOT a background task) — Android OEMs
  # aggressively kill background work, so we check whenever the user
  # foregrounds the app, which is when they actually care about updates.
  flutter_local_notifications: ^17.2.3

  # System share sheet for sozoread:// deep links from the detail screen.
  share_plus: ^10.1.4

  # App version lookup for the changelog viewer (compare cold-start
  # version against persisted last-seen-version to decide whether to
  # pop the What's new sheet).
  package_info_plus: ^8.0.2

  # Renders GitHub release notes (markdown) in the changelog screen +
  # What's new bottom sheet.
  flutter_markdown: ^0.7.4+1

  # Keep the screen on while the manga reader is mounted.
  wakelock_plus: ^1.2.10

  # Save individual manga panels to the device gallery via long-press.
  saver_gallery: ^4.0.1

  # AniList / MAL OAuth tokens — encrypted at rest via Android Keystore /
  # iOS Keychain rather than the plaintext Hive box used for prefs.
  # (url_launcher above is reused to open the OAuth login URL.)
  flutter_secure_storage: ^9.2.2

  # Network connectivity detection. Used by the downloads layer to enforce
  # the user's "WiFi only" preference: jobs picked up while on cellular
  # are paused with a "Waiting for WiFi" note, and the worker pool is
  # re-kicked whenever the link transitions back to WiFi.
  connectivity_plus: ^6.1.0

  # Android foreground service that anchors a sticky notification while
  # downloads are in flight. The downloads themselves continue running
  # in the main isolate via DownloadsRepository's worker pool; this
  # plugin exists purely to stop Android from killing the process when
  # the user backgrounds the app. iOS gets the plugin's default ~30s
  # background grace — Apple doesn't allow open-ended background work
  # for apps like this.
  flutter_background_service: ^5.0.10

  # SHA-256 hashing for the App Lock PIN (salt+pin -> digest, stored in
  # flutter_secure_storage). Already pulled transitively by
  # supabase_flutter; declared here so the import is explicit.
  crypto: ^3.0.5

  # Biometric prompt (Face ID / Touch ID / fingerprint) for App Lock.
  # PIN remains the fallback and the source of truth for the lock state.
  local_auth: ^2.3.0

  # Android SAF (Storage Access Framework) tree picker + persistable URI
  # permission. Used by the storage-location picker so users can route
  # downloaded chapters onto an SD card / external folder without
  # requesting the Play-Store-restricted MANAGE_EXTERNAL_STORAGE
  # permission. iOS gets a no-op fallback (Documents directory only).
  # `saf_util` provides the picker + tree ops (list/mkdirp/exists/copy/
  # delete); `saf_stream` is the companion package from the same author
  # used purely for byte I/O against content:// URIs because saf_util
  # 0.7.0 only exposes raw file descriptors, which are awkward to
  # read/write from pure Dart.
  saf_util: ^0.7.0
  saf_stream: ^0.10.0

  # Text-to-Speech for the novel reader. flutter_tts wraps each
  # platform's native TTS engine; audio_service exposes our handler to
  # the OS media-controls notification so users can play/pause from
  # the lock screen.
  flutter_tts: ^4.2.0
  audio_service: ^0.18.15

  # Optional neural / on-device TTS engine. sherpa-onnx wraps the k2-fsa
  # C++ runtime and ships per-ABI native libs via plugin-default
  # packages (`sherpa_onnx_android_arm64`, `_armeabi`, `_x86`, `_x86_64`,
  # plus `_ios`, `_macos`, `_linux`, `_windows`). The user picks the
  # engine in settings and downloads a Piper-format voice into app-
  # documents; `_SherpaTtsEngine` loads it at runtime.
  sherpa_onnx: ^1.13.2
  # PCM playback for the neural engine. We render each paragraph to a
  # temp WAV and let `audioplayers` stream it — lighter than just_audio
  # (no platform interface fan-out + no media-controls plugin needed
  # since `audio_service` already owns the notification).
  audioplayers: ^6.6.0

  # Neural-voice archive extraction. The sherpa-onnx Piper voice
  # releases ship as `.tar.bz2`, so we use the `archive` package to
  # decode bz2 then untar in pure Dart (no native deps).
  archive: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

  # Native splash screen generator.
  flutter_native_splash: ^2.4.4

  # Native launcher-icon generator (Android mipmaps + iOS AppIcon set).
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  # NOTE: launcher icons are currently managed externally via the
  # EasyAppIcon package the designer ships. The Android mipmaps,
  # adaptive XMLs, and iOS AppIcon.appiconset were copied directly
  # from that bundle. Do NOT run `dart run flutter_launcher_icons` —
  # it would overwrite the proper adaptive foreground / safe-zone
  # work the designer did.
  android: "ic_launcher"
  ios: true
  image_path: "assets/branding/sozo_new_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - providers/mangadex.js
    - providers/mangakakalot.js
    - providers/weebcentral.js
    - providers/mangapill.js
    - providers/mangakatana.js
    - providers/freewebnovel.js
    - providers/novelbin.js
    - assets/icons/sozo_red.png
    - assets/icons/sozo_blue.png
    - assets/icons/sozo_green.png
    - assets/icons/sozo_purple.png
    - assets/branding/sozo_logo_red.png
    - assets/branding/sozo_logo_blue.png
    - assets/branding/sozo_logo_green.png
    - assets/branding/sozo_logo_purple.png
    - assets/branding/sozo_new_logo.png
    - assets/splash/sozo_read_wordmark.png
    - assets/splash/sozo_read_wordmark_transparent.png
